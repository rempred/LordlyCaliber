<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OB64 Mod Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header">
    <h1>OB64 Mod Editor</h1>
    <div class="header-buttons">
      <label for="rom-file" class="btn-file">Load ROM</label>
      <input type="file" id="rom-file" accept=".v64,.z64,.n64">

      <label for="patch-file" class="btn-file btn-secondary" id="btn-load-patch-label" aria-disabled="true">Load Patch</label>
      <input type="file" id="patch-file" accept=".json,application/json" disabled>

      <button id="btn-save-patch" class="btn-secondary" disabled>Save Patch</button>
      <button id="btn-export" disabled>Export ROM</button>

      <span id="patch-chip" class="patch-chip" hidden></span>
    </div>
  </div>

  <div class="tab-bar" id="tab-bar">
    <button data-tab="shops" class="active">Shops</button>
    <button data-tab="enemies" style="display:none">Enemies</button>
    <button data-tab="missions" style="display:none">Missions</button>
    <button data-tab="scenarios" style="display:none">Scenarios</button>
    <button data-tab="classes">Classes</button>
    <button data-tab="items">Items</button>
    <button data-tab="encounters">Encounters</button>
    <button data-tab="save">Save Game Editor</button>
    <button data-tab="map" style="display:none">Map</button>
  </div>

  <div class="content" id="content">
    <div class="empty-state" id="empty-state">
      <h2>No ROM Loaded</h2>
      <p>Click "Load ROM" to open an Ogre Battle 64 .v64 ROM file.</p>
    </div>

    <div class="tab-panel active" id="panel-shops"></div>
    <div class="tab-panel" id="panel-enemies"></div>
    <div class="tab-panel" id="panel-missions"></div>
    <div class="tab-panel" id="panel-scenarios"></div>
    <div class="tab-panel" id="panel-classes"></div>
    <div class="tab-panel" id="panel-items"></div>
    <div class="tab-panel" id="panel-encounters"></div>
    <div class="tab-panel" id="panel-save"></div>
    <div class="tab-panel" id="panel-map"></div>
  </div>

  <div class="status-bar" id="status-bar">
    No ROM loaded
  </div>

  <script src="vendor/fflate.min.js"></script>
  <script src="data.js"></script>
  <script src="parsers.js"></script>
  <script src="repack.js"></script>
  <script src="patch.js"></script>
  <script src="app.js"></script>
</body>
</html>
